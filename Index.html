<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jatolog | Bitácora de Autor</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1a1a1a;
            --text-color: #dcdcdc;
            --accent-color: #00f5d4;
            --font-main: 'Nunito', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: var(--font-main); line-height: 1.8; }
        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        
        header { text-align: center; padding-bottom: 60px; }
        h1 { font-size: 3rem; letter-spacing: -2px; text-transform: uppercase; }
        span.dot { color: var(--accent-color); animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* Estilo Wattpad/Blog */
        .post-card { 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 12px; 
            margin-bottom: 25px; 
            border-left: 0px solid var(--accent-color);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .post-card:hover { 
            transform: scale(1.02); 
            border-left: 8px solid var(--accent-color);
            background: #252525;
        }
        .post-card h3 { color: var(--accent-color); font-size: 1.5rem; margin-bottom: 10px; }
        
        /* Visor de lectura */
        #reader-view { display: none; background: var(--bg-color); position: fixed; top: 0; left: 0; width: 100%; height: 100%; overflow-y: auto; z-index: 100; padding: 40px 20px; }
        .close-btn { color: var(--accent-color); cursor: pointer; font-weight: bold; margin-bottom: 20px; display: inline-block; }
        #content-area { max-width: 700px; margin: 0 auto; font-size: 1.2rem; }
        #content-area h1, #content-area h2 { color: var(--accent-color); margin-top: 40px; }

        .btn-eigengrau { border: 1px solid var(--accent-color); color: var(--accent-color); padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; margin-bottom: 50px; display: inline-block; }
    </style>
</head>
<body>

    <div id="main-site" class="container">
        <header>
            <h1>JATOLOG<span class="dot">_</span></h1>
            <p style="opacity: 0.6">Bitácora técnica y literaria</p>
        </header>

        <center><a href="https://eigengrau-novel.netlify.app/" class="btn-eigengrau" target="_blank">IR A EIGENGRAU</a></center>

        <section id="log-list">
            <h2 style="margin-bottom: 30px; opacity: 0.8;">// escritos_recientes</h2>
            <div id="posts-container">Cargando biblioteca...</div>
        </section>
    </div>

    <div id="reader-view">
        <div class="container">
            <span class="close-btn" onclick="closeReader()">← VOLVER AL LOG</span>
            <article id="content-area"></article>
        </div>
    </div>

    <script>
        const repo = "Jpintomontalva/jatolog";

        async function loadPosts() {
            const container = document.getElementById('posts-container');
            try {
                const res = await fetch(`https://api.github.com/repos/${repo}/contents/blog`);
                const files = await res.json();
                
                container.innerHTML = '';
                files.reverse().forEach(file => {
                    if(file.name.endsWith('.md')) {
                        const title = file.name.split('-').slice(3).join(' ').replace('.md', '').toUpperCase();
                        const card = document.createElement('div');
                        card.className = 'post-card';
                        card.innerHTML = `<h3>${title}</h3><p>Presiona para leer...</p>`;
                        card.onclick = () => openReader(file.download_url);
                        container.appendChild(card);
                    }
                });
            } catch (e) {
                container.innerHTML = "Asegúrate de que el repo sea PÚBLICO en GitHub Settings.";
            }
        }

        async function openReader(url) {
            const contentArea = document.getElementById('content-area');
            const reader = document.getElementById('reader-view');
            const res = await fetch(url);
            const text = await res.json();
            // Decodificamos el texto de GitHub (base64)
            const decodedText = decodeURIComponent(escape(atob(text.content)));
            
            contentArea.innerHTML = marked.parse(decodedText);
            reader.style.display = 'block';
            document.getElementById('main-site').style.display = 'none';
        }

        function closeReader() {
            document.getElementById('reader-view').style.display = 'none';
            document.getElementById('main-site').style.display = 'block';
        }

        loadPosts();
    </script>
</body>
</html>
