<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jatolog | Bitácora de Autor</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --accent-color: #00f5d4; /* Tu turquesa preferido */
            --font-main: 'Nunito', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            line-height: 1.6;
            padding: 0 20px;
        }

        header {
            padding: 60px 0 40px 0;
            text-align: center;
        }

        h1 { 
            font-size: 2.8rem; 
            letter-spacing: -2px; 
            font-weight: 700;
            text-transform: uppercase;
        }
        
        /* Cursor parpadeante */
        span.dot { 
            color: var(--accent-color); 
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        nav { margin-top: 25px; }
        nav a {
            color: var(--text-color);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: color 0.3s;
        }

        nav a:hover { color: var(--accent-color); }

        .container {
            max-width: 850px;
            margin: 0 auto;
        }

        /* Bloque Eigengrau */
        .featured-box {
            border: 1px solid #222;
            padding: 40px;
            margin: 50px 0;
            border-radius: 12px;
            background: linear-gradient(145deg, #181818, #121212);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-left: 4px solid var(--accent-color);
        }

        .btn {
            display: inline-block;
            background-color: var(--accent-color);
            color: #121212;
            padding: 12px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 245, 212, 0.3);
        }

        /* El Log Dinámico */
        #log { margin-top: 60px; }
        h2 { margin-bottom: 30px; font-weight: 400; color: var(--accent-color); text-transform: lowercase; }
        
        #log-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .post-card {
            background: #1a1a1a;
            padding: 25px;
            border-radius: 8px;
            border-bottom: 2px solid transparent;
            transition: 0.3s;
            cursor: pointer;
        }

        .post-card:hover {
            border-bottom-color: var(--accent-color);
            background: #222;
        }

        .post-card h3 { 
            color: var(--accent-color); 
            margin-bottom: 10px;
            font-size: 1.2rem;
        }

        .post-date {
            font-size: 0.7rem;
            opacity: 0.5;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        footer {
            text-align: center;
            padding: 80px 0 40px 0;
            font-size: 0.8rem;
            opacity: 0.5;
            letter-spacing: 1px;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            nav a { display: block; margin: 15px 0; }
        }
    </style>
</head>
<body>

    <header class="container">
        <h1>JATOLOG<span class="dot">_</span></h1>
        <nav>
            <a href="#log">El Log</a>
            <a href="https://eigengrau-novel.netlify.app/" target="_blank">Eigengrau</a>
        </nav>
    </header>

    <main class="container">
        
        <section class="featured-box">
            <h2>Eigengrau</h2>
            <p>Explora el vacío en mi proyecto principal de fantasía oscura y maquetación técnica.</p>
            <a href="https://eigengrau-novel.netlify.app/" class="btn" target="_blank">Abrir Expediente</a>
        </section>

        <section id="log">
            <h2>// bitácora_de_escritos</h2>
            <div id="log-container">
                <p>Sincronizando pensamientos...</p>
            </div>
        </section>

    </main>

    <footer>
        <p>SISTEMA JATOLOG // 2026 // CHILE</p>
    </footer>

    <script>
        // FUNCIÓN PARA CARGAR POSTS DESDE GITHUB
        async function loadPosts() {
            const container = document.getElementById('log-container');
            try {
                // Reemplaza Jpintomontalva por tu usuario si fuera necesario, 
                // pero según lo que vimos es este:
                const response = await fetch('https://api.github.com/repos/Jpintomontalva/jatolog/contents/blog');
                const files = await response.json();
                
                if(!files || files.length === 0) {
                    container.innerHTML = "<p>Aún no hay entradas en el log. Publica algo desde /admin.</p>";
                    return;
                }

                container.innerHTML = '';
                // Invertimos el orden para que lo más nuevo salga primero
                files.reverse().forEach(file => {
                    if(file.name.endsWith('.md')) {
                        const title = file.name.replace(/-/g, ' ').replace('.md', '');
                        const card = document.createElement('div');
                        card.className = 'post-card';
                        card.innerHTML = `
                            <span class="post-date">Entrada Reciente</span>
                            <h3>${title.toUpperCase()}</h3>
                            <p>Haz clic para leer el archivo completo.</p>
                        `;
                        // Al hacer clic, abre el archivo en GitHub
                        card.onclick = () => window.open(file.html_url, '_blank');
                        container.appendChild(card);
                    }
                });
            } catch (e) {
                container.innerHTML = "<p>Conectando con la base de datos...</p>";
            }
        }

        loadPosts();

        // MANEJO DE LOGIN NETLIFY
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    window.netlifyIdentity.on("login", () => {
                        document.location.href = "/admin/";
                    });
                }
            });
        }
    </script>

</body>
</html>
